<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Data Sampah - BPS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
  body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  .header-section { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
  .logo-bps { width: 70px; height: 70px; object-fit: contain; }
  .header-text h1 { color: #2c5282; font-size: 24px; margin: 0; }
  .header-text .institution { color: #718096; font-size: 13px; margin-top: 4px; }
  .subtitle { text-align: center; color: #718096; margin-bottom: 24px; font-size: 14px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; color: #2d3748; }
  input, textarea { width: 100%; padding: 10px; border: 1.5px solid #cbd5e0; border-radius: 8px; font-size: 14px; }
  input:focus, textarea:focus { outline: none; border-color: #667eea; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .alert { padding: 12px; border-radius: 8px; margin-top: 16px; display: none; }
  .alert.success { background: #c6f6d5; color: #22543d; display: block; }
  .alert.error { background: #fed7d7; color: #742a2a; display: block; }
  .preview { margin-top: 8px; max-width: 200px; border-radius: 8px; display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header-section">
    <img src="https://bpsrw.dinaslhdki.id/images/logo.png" alt="Logo BPS" class="logo-bps">
    <div class="header-text">
      <h1>Input Data Sampah Pilah</h1>
      <p class="institution">Bidang Pengelolaan Sampah RT/RW<br>Kelurahan Kota Bambu Utara</p>
    </div>
  </div>
  <p class="subtitle">Data otomatis tersimpan & rapi di Google Sheets</p>

  <form id="formSampah">
    <div class="form-group">
      <label>Foto Sampah *</label>
      <input type="file" name="foto" accept="image/*" id="inputFoto" required>
      <img id="preview" class="preview" alt="preview">
    </div>
    <div class="form-group">
      <label>Nama *</label>
      <input type="text" name="nama" required>
    </div>
    <div class="form-group">
      <label>Alamat *</label>
      <textarea name="alamat" rows="2" required></textarea>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>RT *</label>
        <input type="text" name="rt" pattern="[0-9]{1,5}" required>
      </div>
      <div class="form-group">
        <label>RW *</label>
        <input type="text" name="rw" pattern="[0-9]{1,5}" required>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Organik (kg)</label>
        <input type="number" name="organik" step="0.01" min="0" value="0" required>
      </div>
      <div class="form-group">
        <label>Anorganik (kg)</label>
        <input type="number" name="anorganik" step="0.01" min="0" value="0" required>
      </div>
      <div class="form-group">
        <label>B3 (kg)</label>
        <input type="number" name="b3" step="0.01" min="0" value="0" required>
      </div>
      <div class="form-group">
        <label>Residu (kg)</label>
        <input type="number" name="residu" step="0.01" min="0" value="0" required>
      </div>
    </div>
    <button type="submit" id="btnSubmit">Kirim Data</button>
    <div id="alert" class="alert"></div>
  </form>
</div>

<script>
  // ⚠️ PENTING: GANTI URL INI DENGAN URL WEB APP ANDA
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyM8WfAYnPsHSQmIALaRjZcz3y4-ogdE9qw6g_0_z7tkQPADX2wIAA1kghEinAPVAJvWQ/exec';
  
  const form = document.getElementById('formSampah');
  const alertBox = document.getElementById('alert');
  const preview = document.getElementById('preview');
  const inputFoto = document.getElementById('inputFoto');
  const btnSubmit = document.getElementById('btnSubmit');
  
  // Preview foto
  inputFoto.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      console.log('File dipilih:', file.name);
    }
  });
  
  // Konversi ke base64
  function fileToBase64(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.onload = function() { resolve(reader.result); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  
  function showAlert(msg, type) {
    alertBox.className = 'alert ' + type;
    alertBox.textContent = msg;
    if (type === 'success') {
      setTimeout(function() { alertBox.className = 'alert'; }, 5000);
    }
  }
  
  // Submit form
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    btnSubmit.disabled = true;
    btnSubmit.textContent = 'Mengirim...';
    alertBox.className = 'alert';
    
    try {
      const file = inputFoto.files[0];
      if (!file) throw new Error('Foto wajib diupload');
      
      console.log('Memulai upload...');
      
      // Konversi foto
      const fotoBase64 = await fileToBase64(file);
      console.log('Foto dikonversi, length:', fotoBase64.length);
      
      // Buat payload
      const payload = {
        nama: form.nama.value.trim(),
        alamat: form.alamat.value.trim(),
        rt: form.rt.value.trim(),
        rw: form.rw.value.trim(),
        organik: parseFloat(form.organik.value) || 0,
        anorganik: parseFloat(form.anorganik.value) || 0,
        b3: parseFloat(form.b3.value) || 0,
        residu: parseFloat(form.residu.value) || 0,
        foto: fotoBase64
      };
      
      console.log('Payload:', payload);
      console.log('URL:', APPS_SCRIPT_URL);
      
      // Kirim ke Apps Script
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      
      console.log('Response status:', response.status);
      
      const total = (payload.organik + payload.anorganik + payload.b3 + payload.residu).toFixed(2);
      showAlert('✓ Data berhasil disimpan! Total: ' + total + ' kg', 'success');
      
      form.reset();
      preview.style.display = 'none';
      
    } catch (err) {
      console.error('Error:', err);
      showAlert('✗ ' + err.message, 'error');
    } finally {
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Kirim Data';
    }
  });
  
  console.log('Form siap. URL Apps Script:', APPS_SCRIPT_URL);
</script>
</body>
</html>
